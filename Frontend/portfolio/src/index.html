<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio</title>
  <base href="/">
  <!--
    viewport-fit=cover: support safe-area-inset for iPhone notch / Dynamic Island (T102)
    shrink-to-fit=no:   prevent iOS Safari auto-shrinking content
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no">
  <!-- Disable automatic phone number / address detection on mobile (prevents blue underlines) -->
  <meta name="format-detection" content="telephone=no, address=no, email=no">
  <!-- Theme colour for mobile browser chrome -->
  <meta name="theme-color" content="#0D1B2A">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- T108: DNS prefetch / preconnect for external domains (reduce connection latency) -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--
    T112: Optimised font loading
    - font-display=swap: text remains visible while fonts load (avoids FOIT)
    - Only load required weights (400, 500, 700) to reduce payload
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Material Icons - deferred to avoid render-blocking -->
  <link
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet"
    media="print"
    onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </noscript>

  <!--
    T109: Critical CSS inlined to eliminate render-blocking
    Only include above-the-fold styles; full styles are loaded via the Angular bundle.
  -->
  <style>
    /* ── Critical path CSS ─────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{
      background-color:#0D1B2A;
      color:#e0e0e0;
      font-family:Roboto,'Helvetica Neue',Arial,sans-serif;
      font-size:16px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden
    }
    /* Prevent layout shift while Angular bootstraps */
    app-root{display:block;min-height:100vh}
    /* System font stack fallback while Roboto loads (T112) */
    :root{
      --font-sans: Roboto,'Helvetica Neue',Arial,system-ui,-apple-system,sans-serif;
      font-family:var(--font-sans)
    }
    /* Reduced motion: respect user preference */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>

  <!--
    T108: Preload critical above-the-fold resources
    The hero image URL is dynamic (from API), so we preconnect to the API origin instead.
    Angular will inject <link rel="preload"> tags for hero image via ImageOptimizerService.preloadCriticalImages().
  -->
  <!-- Preload the Roboto font file used in first paint (400 weight, latin subset) -->
  <link
    rel="preload"
    href="https://fonts.gstatic.com/s/roboto/v32/KFOmCnqEu92Fr1Mu4mxKKTU1Kg.woff2"
    as="font"
    type="font/woff2"
    crossorigin>
</head>
<body>
  <a class="skip-nav" href="#main-content">Skip to main content</a>
  <app-root></app-root>
</body>
</html>
