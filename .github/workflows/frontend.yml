name: Frontend CI/CD

on:
  push:
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/**'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend/portfolio

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  cd:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./Frontend/portfolio

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        run: |
          npx netlify deploy \
          --prod \
          --dir dist/portfolio/browser \
          --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} \
          --site ${{ secrets.NETLIFY_SITE_ID }}
